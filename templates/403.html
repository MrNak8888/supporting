<!DOCTYPE html>
<html lang="{{ current_locale or 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ _('Access Denied') }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <style>
    body { background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
    .error-card { text-align: center; background: #fff; padding: 60px 40px; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.08); max-width: 480px; }
    .error-code { font-size: 6rem; font-weight: 800; color: #ef4444; line-height: 1; }
    .error-title { font-size: 1.5rem; font-weight: 700; color: #1a3c5e; margin: 16px 0 8px; }
    .error-desc { color: #64748b; font-size: .95rem; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">403</div>
    <div class="error-title">{{ _('Access Denied') }}</div>
    <div class="error-desc">{{ _('You do not have permission to access this page.') }}</div>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
      <i class="fas fa-th-large me-1"></i> {{ _('Go to Dashboard') }}
    </a>
  </div>
</body>
</html>
